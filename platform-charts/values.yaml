spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

cilium:
  operator:
    replicas: 1
  kubeProxyReplacement: "true"
  k8sServiceHost: k3d-nexus-platform-server-0
  k8sServicePort: 6443
  bpf:
    masquerade: false
  l2announcements:
    enabled: true
  ingressController:
    enabled: true
    default: true
    loadbalancerMode: shared