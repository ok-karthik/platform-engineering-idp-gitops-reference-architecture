spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

components:
  argoRollouts:
    enabled: true
  certManager:
    enabled: true
  crossplane:
    enabled: false
  kyverno:
    enabled: false
  sealedSecrets:
    enabled: false
  sealedSecretDemo:
    enabled: false
  traefik:
    enabled: true
    namespace: traefik
  argocdIngress:
    enabled: true
  loki:
    enabled: true
    namespace: observability
  opentelemetry:
    enabled: true
    namespace: observability
  prometheus:
    enabled: true
    namespace: observability
  tempo:
    enabled: true
    namespace: observability
  tenantApps:
    enabled: true