apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: {{ .Values.spec.destination.namespace }}
spec:
  project: {{ .Values.spec.project }}
  source:
    repoURL: 'https://helm.cilium.io/'
    targetRevision: '1.19.4'
    chart: cilium
    helm:
      values: |
        {{- if and .Values.cilium (and .Values.cilium.operator .Values.cilium.operator.replicas) }}
        operator:
          replicas: {{ .Values.cilium.operator.replicas }}
        {{- end }}
        {{- if and .Values.cilium .Values.cilium.kubeProxyReplacement }}
        kubeProxyReplacement: {{ .Values.cilium.kubeProxyReplacement }}
        {{- end }}
        {{- if and .Values.cilium (and .Values.cilium.k8sServiceHost (ne .Values.cilium.k8sServiceHost "")) }}
        k8sServiceHost: {{ .Values.cilium.k8sServiceHost }}
        k8sServicePort: {{ .Values.cilium.k8sServicePort | default 6443 }}
        {{- end }}
        {{- if and .Values.cilium .Values.cilium.bpf }}
        bpf:
          masquerade: {{ .Values.cilium.bpf.masquerade }}
        {{- end }}
        {{- if and .Values.cilium .Values.cilium.l2announcements }}
        l2announcements:
          enabled: {{ .Values.cilium.l2announcements.enabled }}
        {{- end }}
        ingressController:
          enabled: {{ .Values.cilium.ingressController.enabled | default false }}
          default: {{ .Values.cilium.ingressController.default | default false }}
          loadbalancerMode: {{ .Values.cilium.ingressController.loadbalancerMode | default "shared" }}
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    #syncOptions:
      
