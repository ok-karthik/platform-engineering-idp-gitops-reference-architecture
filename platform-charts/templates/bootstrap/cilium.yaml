apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: {{ .Values.spec.destination.namespace }}
spec:
  project: {{ .Values.spec.project }}
  source:
    repoURL: 'https://helm.cilium.io/'
    targetRevision: '1.19.4'
    chart: cilium
    helm:
      values: |
        {{- if and .Values.cilium (and .Values.cilium.operator .Values.cilium.operator.replicas) }}
        operator:
          replicas: {{ .Values.cilium.operator.replicas }}
        {{- end }}
        ingressController:
          enabled: {{ .Values.cilium.ingressController.enabled | default false }}
          default: {{ .Values.cilium.ingressController.default | default false }}
          loadbalancerMode: {{ .Values.cilium.ingressController.loadbalancerMode | default "shared" }}
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    #syncOptions:
      
