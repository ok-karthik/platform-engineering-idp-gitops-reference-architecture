{{- if and .Values.cilium (and .Values.cilium.l2announcements .Values.cilium.l2announcements.enabled) -}}
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: k3d-lb-pool
  annotations:
    argocd.argoproj.github.io/sync-wave: "1"
spec:
  blocks:
    - cidr: 192.168.97.240/28
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: k3d-l2-policy
  annotations:
    argocd.argoproj.github.io/sync-wave: "1"
spec:
  interfaces:
    - ^eth0$
  externalIPs: true
  loadBalancerIPs: true
{{- end }}
