# Configure Copier to use standard Jinja2 curly braces
_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"

tenant_name:
  type: str
  help: "Tenant Name"

app_name:
  type: str
  help: "Application Name"

app_type:
  type: str
  help: "Application Type"
  default: "python"

app_port:
  type: int
  help: "Application Port"
  default: 8080

cloud_services:
  type: json
  help: "Cloud Services to be included in the workload"
  default: ["aws-postgres", "aws-s3"]

exclude_patterns:
  type: json
  help: "Patterns to exclude from rendering"
  default: []

_exclude:
  - ".venv"
  - "__pycache__"
  - "*.egg-info"
  - "uv.lock"
