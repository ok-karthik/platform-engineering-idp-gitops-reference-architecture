name: CI Pipeline - Build & Publish

on:
  push:
    branches:
      - main
    paths:
      - 'app-src/**'

jobs:
  build:
    name: Build App Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up the Cloud Native Buildpacks 'pack' CLI tool
      - name: Setup pack CLI
        uses: buildpacks/github-actions/setup-pack@v2.10.2

      # Example Registry Login (uncomment when you configure secrets)
      # - name: Log in to Docker Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io # or your private registry
      #     username: {% raw %}${{ github.actor }}{% endraw %}
      #     password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      # Builds the application using the generic builder image
      # The app code is in the 'app-src' folder, and we name the image after our app.
      - name: Build with Buildpacks
        run: |
          pack build "ghcr.io/{% raw %}${{ github.repository_owner }}{% endraw %}/{{ app_name }}:latest" \
            --path ./app-src \
            --builder paketobuildpacks/builder-jammy-base
            # Add --publish at the end once you configure registry login above to push the image
