name: CI Pipeline - Build & Publish

on:
  push:
    branches:
      - main
    paths:
      - 'app-src/**'

jobs:
  build:
    name: Build App Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Detect if a Dockerfile exists in the app source code
      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "./app-src/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Dockerfile found! Proceeding with Docker BuildKit."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile found. Falling back to Cloud Native Buildpacks."
          fi

      # ----------------------------------------------------
      # PATH A: Build using Dockerfile (BuildKit)
      # ----------------------------------------------------
      
      # Sets up Docker Buildx (which enables advanced BuildKit features)
      - name: Set up Docker Buildx
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      # Example Registry Login (uncomment when you configure secrets)
      # - name: Log in to Docker Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: {% raw %}${{ github.actor }}{% endraw %}
      #     password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Build and Push with BuildKit
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./app-src
          file: ./app-src/Dockerfile
          tags: "ghcr.io/{% raw %}${{ github.repository_owner }}{% endraw %}/{{ app_name }}:latest"
          push: false # Set to true once registry login is configured above

      # ----------------------------------------------------
      # PATH B: Build using Cloud Native Buildpacks
      # ----------------------------------------------------

      # Sets up the Cloud Native Buildpacks 'pack' CLI tool
      - name: Setup pack CLI
        if: steps.check_dockerfile.outputs.exists == 'false'
        uses: buildpacks/github-actions/setup-pack@v2.10.2

      - name: Build with Buildpacks
        if: steps.check_dockerfile.outputs.exists == 'false'
        run: |
          pack build "ghcr.io/{% raw %}${{ github.repository_owner }}{% endraw %}/{{ app_name }}:latest" \
            --path ./app-src \
            --builder paketobuildpacks/builder-jammy-base
            # Add --publish at the end once registry login is configured to push the image
