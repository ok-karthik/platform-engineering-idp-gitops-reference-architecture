replicaCount: 1

image:
  repository: "ghcr.io/{{ github_owner }}/{{ github_repo }}/{{ team_name }}/{{ app_name }}"
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  {% if app_type == 'springboot' -%}
  instrumentation.opentelemetry.io/inject-java: "true"
  {%- elif app_type == 'golang' -%}
  instrumentation.opentelemetry.io/inject-sdk: "true"
  {%- else -%}
  instrumentation.opentelemetry.io/inject-{{ app_type }}: "true"
  {%- endif %}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: {{ app_port }}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: platform-gateway
      namespace: traefik
  hostnames:
    - "{{ app_name }}.localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
