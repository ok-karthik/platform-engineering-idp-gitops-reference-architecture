replicaCount: 1

image:
  repository: "ghcr.io/{{ github_owner }}/{{ github_repo }}/{{ team_name }}/{{ app_name }}"
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  {% if app_type == 'springboot' -%}
  instrumentation.opentelemetry.io/inject-java: "true"
  {%- elif app_type == 'golang' -%}
  instrumentation.opentelemetry.io/inject-sdk: "true"
  {%- else -%}
  instrumentation.opentelemetry.io/inject-{{ app_type }}: "true"
  {%- endif %}

podLabels: 
  team: "{{ team_name }}"

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: {{ app_port }}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: platform-gateway
      namespace: traefik # Tells the route: "Go attach yourself to the Traefik gateway in the traefik namespace"
  hostnames:
    - "{{ app_name }}.{{ team_name }}.localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
