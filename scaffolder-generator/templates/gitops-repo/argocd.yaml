# Save this on your laptop as master-app.yaml and run: kubectl apply -f master-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/ok-karthik/gitops-idp-blueprint.git"
    targetRevision: HEAD
    path: platform-charts/templates/observability # This tells Argo to apply everything inside the bootstrap folder!
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
