name: CD Pipeline - Render & Push GitOps

on:
  push:
    branches:
      - main
    paths:
      - 'app-src/**'

jobs:
  render:
    name: Render manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render the manifests
        run: |
          helm template {{ app_name }} templated-manifests | awk -v out="../rendered-manifests" -F": " '$0~/^# Source: /{file=out"/"$2; dir=gensub(/\/[^\/]+$/, "", "g", file); system("mkdir -p " dir); print > file} $0!~/^#/ && $0!="---"{print >> file}'

      # Implement blue-green deployment later https://github.com/argoproj/argocd-example-apps/tree/master/blue-green