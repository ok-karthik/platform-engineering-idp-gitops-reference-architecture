replicaCount: 1

image:
  repository: "ghcr.io/my-org/my-python-app"
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  instrumentation.opentelemetry.io/inject-python: "true"
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: platform-gateway
      namespace: traefik
  hostnames:
    - "my-python-app.localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /