# Source: my-python-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-python-app
  labels:
    helm.sh/chart: my-python-app-0.1.0
    app.kubernetes.io/name: my-python-app
    app.kubernetes.io/instance: my-python-app
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: my-python-app
      app.kubernetes.io/instance: my-python-app
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
      labels:
        helm.sh/chart: my-python-app-0.1.0
        app.kubernetes.io/name: my-python-app
        app.kubernetes.io/instance: my-python-app
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: my-python-app
      containers:
        - name: my-python-app
          image: "ghcr.io/my-org/my-python-app:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
