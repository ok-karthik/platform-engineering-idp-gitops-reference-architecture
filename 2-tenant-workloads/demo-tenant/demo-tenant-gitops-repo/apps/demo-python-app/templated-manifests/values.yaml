replicaCount: 1

image:
  repository: "ghcr.io/ok-karthik/platform-engineering-idp-gitops-reference-architecture/demo-tenant/demo-python-app"
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  instrumentation.opentelemetry.io/inject-python: "true"

podLabels: 
  team: "demo-tenant"

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: platform-gateway
      namespace: traefik # Tells the route: "Go attach yourself to the Traefik gateway in the traefik namespace"
  hostnames:
    - "demo-python-app.demo-tenant.localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /