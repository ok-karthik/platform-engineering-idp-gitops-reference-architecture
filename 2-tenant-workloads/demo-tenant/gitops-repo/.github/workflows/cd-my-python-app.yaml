name: CD Pipeline - Render & Push my-python-app

on:
  push:
    branches:
      - main
    paths:
      - 'apps/my-python-app/templated-manifests/**'

jobs:
  render:
    name: Render manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render the manifests
        run: |
          cd apps/my-python-app

          # Convert GitHub repository path to lowercase for Docker registry compatibility
          IMAGE_REPO=$(echo "ghcr.io/${{ github.repository }}/demo-tenant/my-python-app" | tr '[:upper:]' '[:lower:]')

          # Render Helm chart overriding the image repository
          helm template my-python-app templated-manifests \
            --set image.repository="$IMAGE_REPO" \
            --output-dir rendered-manifests

      # Implement blue-green deployment later https://github.com/argoproj/argocd-example-apps/tree/master/blue-green