replicaCount: 1

image:
  repository: "ghcr.io///team-b/app-b"
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

cloud_services: ['aws-postgres']

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  instrumentation.opentelemetry.io/inject-python: "app-b-autoinstrumentation"

podLabels: 
  team: "team-b"

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 20
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

ingress:
  enabled: true
  annotations: {}
  hosts:
    - host: "app-b.team-b.localhost"
      paths:
        - path: /
          pathType: Prefix
