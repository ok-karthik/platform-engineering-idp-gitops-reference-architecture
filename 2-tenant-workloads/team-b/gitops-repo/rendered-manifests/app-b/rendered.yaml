---
# Source: app-b/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-b
  labels:
    helm.sh/chart: app-b-0.1.0
    app.kubernetes.io/name: app-b
    app.kubernetes.io/instance: app-b
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    team: team-b
automountServiceAccountToken:
---
# Source: app-b/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: app-b
  labels:
    helm.sh/chart: app-b-0.1.0
    app.kubernetes.io/name: app-b
    app.kubernetes.io/instance: app-b
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    team: team-b
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: app-b
    app.kubernetes.io/instance: app-b
---
# Source: app-b/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b
  labels:
    helm.sh/chart: app-b-0.1.0
    app.kubernetes.io/name: app-b
    app.kubernetes.io/instance: app-b
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    team: team-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-b
      app.kubernetes.io/instance: app-b
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: app-b-autoinstrumentation
      labels:
        helm.sh/chart: app-b-0.1.0
        app.kubernetes.io/name: app-b
        app.kubernetes.io/instance: app-b
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
        team: team-b
    spec:
      serviceAccountName: app-b
      containers:
        - name: app-b
          image: "ghcr.io/ok-karthik/platform-engineering-idp-gitops-reference-architecture/team-b/app-b:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
---
# Source: app-b/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-b
  labels:
    helm.sh/chart: app-b-0.1.0
    app.kubernetes.io/name: app-b
    app.kubernetes.io/instance: app-b
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    team: team-b
spec:
  ingressClassName: traefik
  rules:
    - host: "app-b.team-b.localhost"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-b
                port:
                  number: 8080
---
# Source: app-b/templates/instrumentation.yaml
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: app-b-autoinstrumentation
  labels:
    helm.sh/chart: app-b-0.1.0
    app.kubernetes.io/name: app-b
    app.kubernetes.io/instance: app-b
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    team: team-b
spec:
  exporter:
    # Point traces to the centralized Tempo service running in the monitoring namespace
    endpoint: http://tempo.monitoring.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
    - b3
  sampler:
    type: parentbased_always_on
  python:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:latest
    env:
      - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
        value: "system_metrics"
      - name: OTEL_LOGS_EXPORTER
        value: "none"
  java:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
  nodejs:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:latest
